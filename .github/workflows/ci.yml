name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Fmt
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --exclude openausweis-desktop --all-targets -- -D warnings

      - name: Check
        run: cargo check --workspace --exclude openausweis-desktop

  web:
    name: Web and extension checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Typecheck workspaces
        run: npm run typecheck

      - name: Build workspaces
        run: npm run build

  desktop:
    name: Desktop checks (Ubuntu 24.04 / Tauri v2)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libgtk-3-dev \
            pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: desktop-ubuntu-24.04

      - name: Fmt (desktop)
        run: cargo fmt -p openausweis-desktop --check

      - name: Clippy (desktop)
        run: cargo clippy -p openausweis-desktop --all-targets -- -D warnings

      - name: Check (desktop)
        run: cargo check -p openausweis-desktop

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm install

      - name: Typecheck (desktop)
        run: npm run --workspace @openausweis/desktop typecheck
