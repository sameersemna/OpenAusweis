name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Fmt
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --exclude openausweis-desktop --all-targets -- -D warnings

      - name: Check
        run: cargo check --workspace --exclude openausweis-desktop

  web:
    name: Web and extension checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Typecheck workspaces
        run: npm run typecheck

      - name: Build workspaces
        run: npm run build
